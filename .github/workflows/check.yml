name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: bun run check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run no-write check gate
        run: bun run check
