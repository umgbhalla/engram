<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Engram — durable notebook</title>
<style>
  :root {
    --bg: #0c0e14; --panel: #141823; --panel2: #1b2030; --border: #262d40;
    --fg: #e6e9f0; --muted: #8b93a7; --accent: #6ea8fe; --green: #4ade80;
    --amber: #fbbf24; --red: #f87171; --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  a { color: var(--accent); }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header .sub { color: var(--muted); font-size: 12px; }
  .grow { flex: 1; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
    border-radius: 999px; font-size: 12px; font-family: var(--mono); border: 1px solid var(--border);
    font-variant-numeric: tabular-nums; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
    transition-property: background, box-shadow; transition-duration: .2s; }
  .dot.warm { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.cold { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .dot.off { background: var(--red); }
  .layout { display: grid; grid-template-columns: 1fr 340px; height: calc(100% - 53px); }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } aside { display: none; } }
  main { overflow-y: auto; padding: 16px; }
  aside { background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 14px; }
  .cell { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 14px; overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.18);
    transition-property: border-color, box-shadow; transition-duration: .18s; }
  .cell.running { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 6px 18px rgba(110,168,254,.18); }
  .cell-head { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--panel2); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .cell-head .num { color: var(--accent); }
  .cell-head .grow { flex: 1; }
  .cell textarea { width: 100%; border: 0; background: transparent; color: var(--fg);
    font-family: var(--mono); font-size: 13px; padding: 10px; resize: vertical; min-height: 46px; outline: none; }
  .out { font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-word;
    padding: 0 10px 10px; }
  .out .log { color: var(--muted); }
  .out .val { color: var(--green); }
  .out .err { color: var(--red); }
  .out .final { color: var(--amber); }
  .meta { font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 4px 10px;
    border-top: 1px dashed var(--border); font-variant-numeric: tabular-nums; }
  button { background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; min-height: 32px; cursor: pointer; font-size: 12px;
    transition-property: border-color, background, scale; transition-duration: .15s;
    transition-timing-function: cubic-bezier(0.2, 0, 0, 1); }
  button:hover { border-color: var(--accent); }
  button:active { scale: 0.96; }
  button.primary { background: var(--accent); color: #06121f; border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; scale: 1; }
  /* small cell-head controls: keep a ≥40px hit area without bloating the visual */
  .cell-head button { padding: 2px 7px; min-height: 24px; position: relative; }
  .cell-head button::after { content: ""; position: absolute; inset: -9px -4px; }
  label { display: block; font-size: 11px; color: var(--muted); margin: 10px 0 3px; text-transform: uppercase; letter-spacing: .5px; }
  input, textarea.cfg, select { width: 100%; background: var(--panel2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; font-family: var(--mono); font-size: 12px;
    transition-property: border-color; transition-duration: .15s; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; }
  textarea.cfg { resize: vertical; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; }
  h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 18px 0 6px; border-top: 1px solid var(--border); padding-top: 14px; text-wrap: balance; }
  h3:first-child { border-top: 0; padding-top: 0; }
  .hint { color: var(--muted); font-size: 11px; text-wrap: pretty; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .e2e { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel); padding: 12px; }
  code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <h1>Engram</h1>
  <span class="sub">durable hibernating notebook · rquickjs-Rust kernel</span>
  <div class="grow"></div>
  <span class="pill" id="statePill"><span class="dot off" id="stateDot"></span><span id="stateTxt">disconnected</span></span>
  <span class="pill" id="genPill" title="kernel generation / committed cell">gen –</span>
</header>

<div class="layout">
  <main>
    <div class="toolbar">
      <button class="primary" id="addCell">+ Cell</button>
      <button id="runAll">Run all</button>
      <button id="hibernate" title="force-evict in-memory kernel; durable snapshot kept">Hibernate</button>
      <button id="reconnect" title="reconnect to the same durable session id">Reconnect</button>
      <button id="resetSession" title="drop kernel + clear snapshot">Reset</button>
      <button id="runE2e" title="run the deployed UI-to-kernel acceptance check">Run E2E</button>
    </div>
    <div class="e2e out" id="e2eOut" data-status="idle"><span class="log">E2E idle</span></div>
    <div id="cells"></div>
  </main>

  <aside>
    <h3>Session</h3>
    <label>Kernel endpoint (wss)</label>
    <input id="cfgEndpoint" value="wss://engram-kernel.umg-bhalla88.workers.dev" />
    <label>API key (only for engram-cloud; blank for engram-kernel)</label>
    <input id="cfgApiKey" placeholder="md_… (leave blank for v093)" />
    <label>Session id (reconnect to restore state)</label>
    <div class="row">
      <input id="cfgSession" />
      <button id="newSession" style="flex:0 0 auto">new</button>
    </div>
    <p class="hint">State survives reload — same session id resumes the hibernated heap.</p>

    <h3>Config</h3>
    <label>Clock</label>
    <select id="cfgClock"><option value="seeded">seeded (deterministic)</option><option value="real">real</option></select>
    <label>RNG seed</label>
    <input id="cfgSeed" value="42" />
    <label>Stdlib modules (comma, or "true" = default set)</label>
    <input id="cfgModules" value="true" />
    <label>Fetch allowlist (comma hosts, "true"=all, "false"=none)</label>
    <input id="cfgFetch" value="true" />
    <button id="applyConfig" style="margin-top:10px;width:100%">Apply config (fresh session)</button>
    <p class="hint">Config is set on session create; apply makes a new session id so it takes effect on a fresh heap.</p>
  </aside>
</div>

<script type="module">
// ---------------------------------------------------------------------------
// Engram browser client — speaks the kernel WS protocol directly.
//   /ws?id=<session>  ;  {t:"create",config} {t:"eval",src} {t:"gen"} {t:"evict"}
//   {t:"reset"} {t:"setContext",name,blob} {t:"final"}
// For engram-cloud the WS path is /connect?session=<id>&apiKey=<key>; we autodetect.
// The cooperative subLM RLM loop is implemented here (mirrors @engram/sdk) so it runs
// fully against the REMOTE kernel — the kernel never reaches back to the browser.
// ---------------------------------------------------------------------------

const $ = (id) => document.getElementById(id);
const DEFAULT_ENDPOINT = "wss://engram-kernel.umg-bhalla88.workers.dev";
const qs = new URLSearchParams(location.search);
const LS = {
  get k(){ return localStorage.getItem("md_session"); },
  set k(v){ localStorage.setItem("md_session", v); },
  get ep(){ return localStorage.getItem("md_endpoint"); },
  set ep(v){ localStorage.setItem("md_endpoint", v); },
  get key(){ return localStorage.getItem("md_apikey") || ""; },
  set key(v){ localStorage.setItem("md_apikey", v||""); },
};

function randId() { return "nb-" + Math.random().toString(36).slice(2, 10); }
function queryEndpoint() {
  return qs.get("endpoint") || qs.get("kernel") || "";
}

class Kernel {
  constructor() { this.ws = null; this.queue = Promise.resolve(); this.onState = () => {}; }
  url() {
    const ep = $("cfgEndpoint").value.replace(/\/+$/, "");
    const id = $("cfgSession").value;
    const key = $("cfgApiKey").value.trim();
    // v12 uses /connect?session=&apiKey= ; v092 uses /ws?id=
    if (key || /-v1\d?\b/.test(ep) || /connect/.test(ep)) {
      const u = `${ep}/connect?session=${encodeURIComponent(id)}`;
      return key ? `${u}&apiKey=${encodeURIComponent(key)}` : u;
    }
    return `${ep}/ws?id=${encodeURIComponent(id)}`;
  }
  async open() {
    if (this.ws && this.ws.readyState === 1) return;
    this.onState("connecting");
    await new Promise((res, rej) => {
      const ws = new WebSocket(this.url());
      this.ws = ws;
      ws.addEventListener("open", () => res(), { once: true });
      ws.addEventListener("error", (e) => rej(new Error("ws error")), { once: true });
      ws.addEventListener("close", () => this.onState("disconnected"), { once: true });
    });
    // send create config once
    if (this._config) await this.raw({ t: "create", config: this._config });
  }
  setConfig(c) { this._config = c; }
  raw(msg, timeoutMs = 120000) {
    return new Promise((resolve, reject) => {
      const ws = this.ws;
      const onMsg = (ev) => { cleanup(); try { resolve(JSON.parse(ev.data)); } catch (e) { reject(e); } };
      const onClose = () => { cleanup(); reject(new Error("ws closed before reply")); };
      const t = setTimeout(() => { cleanup(); reject(new Error("rpc timeout")); }, timeoutMs);
      function cleanup() { clearTimeout(t); ws.removeEventListener("message", onMsg); ws.removeEventListener("close", onClose); }
      ws.addEventListener("message", onMsg, { once: true });
      ws.addEventListener("close", onClose, { once: true });
      ws.send(JSON.stringify(msg));
    });
  }
  send(msg, timeoutMs) {
    const run = async () => { await this.open(); return this.raw(msg, timeoutMs); };
    const p = this.queue.then(run, run);
    this.queue = p.then(() => {}, () => {});
    return p;
  }
  eval(src, t) { return this.send({ t: "eval", src }, t); }
  gen() { return this.send({ t: "gen" }); }
  evict() { return this.send({ t: "evict" }); }
  reset() { return this.send({ t: "reset" }); }
  close() { if (this.ws) try { this.ws.close(); } catch (_) {} this.ws = null; }
}

const kernel = new Kernel();

// ---- state indicator -------------------------------------------------------
async function refreshState() {
  try {
    const g = await kernel.gen();
    const warm = !!g.inMemory;
    $("stateDot").className = "dot " + (warm ? "warm" : "cold");
    $("stateTxt").textContent = warm ? "warm (in-memory)" : "cold (snapshot)";
    $("genPill").textContent = `gen ${g.generation} · cell ${g.committedCell}`;
  } catch (e) {
    $("stateDot").className = "dot off";
    $("stateTxt").textContent = "disconnected";
    $("genPill").textContent = "gen –";
  }
}
kernel.onState = (s) => {
  if (s === "disconnected") { $("stateDot").className = "dot off"; $("stateTxt").textContent = "disconnected"; }
  if (s === "connecting") { $("stateDot").className = "dot"; $("stateTxt").textContent = "connecting…"; }
};

// ---- config ----------------------------------------------------------------
function buildConfig() {
  const modulesRaw = $("cfgModules").value.trim();
  let modules = true;
  if (modulesRaw && modulesRaw !== "true") modules = modulesRaw === "false" ? false : modulesRaw.split(",").map(s => s.trim()).filter(Boolean);
  const fetchRaw = $("cfgFetch").value.trim();
  let fetch = true; // full-allow by default (matches kernel default); "false" blocks, csv = allowlist
  if (fetchRaw === "false") fetch = false;
  else if (fetchRaw && fetchRaw !== "true") fetch = fetchRaw.split(",").map(s => s.trim()).filter(Boolean);
  return {
    clock: $("cfgClock").value,
    rngSeed: Number($("cfgSeed").value) || 0,
    modules,
    fetch,
  };
}

// ---- cells -----------------------------------------------------------------
let cellSeq = 0;
function addCell(src = "") {
  const id = ++cellSeq;
  const el = document.createElement("div");
  el.className = "cell";
  el.innerHTML = `
    <div class="cell-head"><span class="num">[${id}]</span><span class="grow"></span>
      <button data-run>▶ run (⇧⏎)</button><button data-del>✕</button></div>
    <textarea spellcheck="false" placeholder="// JS — runs against the durable namespace">${src}</textarea>
    <div class="out" hidden></div><div class="meta" hidden></div>`;
  const ta = el.querySelector("textarea");
  const out = el.querySelector(".out");
  const meta = el.querySelector(".meta");
  ta.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && e.shiftKey) { e.preventDefault(); run(); }
  });
  el.querySelector("[data-run]").onclick = run;
  el.querySelector("[data-del]").onclick = () => el.remove();
  async function run() {
    el.classList.add("running"); out.hidden = false; out.innerHTML = "<span class='log'>running…</span>";
    const t0 = performance.now();
    try {
      const r = await kernel.eval(ta.value);
      renderResult(out, r);
      const ms = Math.round(performance.now() - t0);
      meta.hidden = false;
      const restored = r.inMemoryBefore === false;
      meta.innerHTML = `cell ${r.cell} · gen ${r.generation} · ${ms}ms` +
        (restored ? ` · <span style="color:var(--amber)">cold-restored (${r.restoreSource||"snapshot"})</span>` : ` · warm`) +
        (r.checkpoint && r.checkpoint.sizeGz ? ` · snap ${(r.checkpoint.sizeGz/1024).toFixed(1)}KB gz` : "");
    } catch (e) {
      out.innerHTML = `<span class='err'>${esc(String(e.message||e))}</span>`;
    } finally { el.classList.remove("running"); refreshState(); }
  }
  el._run = run; el._ta = ta;
  $("cells").appendChild(el);
  return el;
}

function renderResult(out, r) {
  let html = "";
  for (const l of (r.logs || [])) {
    const txt = typeof l === "string" ? l : `${l.level}: ${l.text}`;
    html += `<div class="log">› ${esc(txt)}</div>`;
  }
  if (!r.ok && r.error) {
    html += `<div class="err">✖ ${esc(r.error.name||"Error")}: ${esc(r.error.message||"")}</div>`;
  } else {
    const v = r.valuePreview != null ? r.valuePreview : r.value;
    if (v !== null && v !== undefined && v !== "")
      html += `<div class="val">⇒ ${esc(typeof v === "string" ? v : JSON.stringify(v))}</div>`;
    else html += `<div class="log">⇒ <i>undefined</i></div>`;
  }
  if (r.final && r.final.kind)
    html += `<div class="final">★ FINAL [${r.final.kind}]: ${esc(String(r.final.value))}</div>`;
  out.innerHTML = html || "<span class='log'>(no output)</span>";
}
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

// ---- deployed system E2E -----------------------------------------------------
function e2eLine(cls, s) { return '<div class="' + cls + '">' + esc(s) + '</div>'; }
function pass(name, detail = "") { return e2eLine("val", "PASS " + name + (detail ? " :: " + detail : "")); }
function fail(name, detail = "") { return e2eLine("err", "FAIL " + name + (detail ? " :: " + detail : "")); }
async function runDeployedE2e() {
  const out = $("e2eOut");
  out.dataset.status = "running";
  out.innerHTML = e2eLine("log", "running deployed UI -> kernel E2E...");
  const oldSession = $("cfgSession").value;
  const testSession = "ui-e2e-" + Date.now().toString(36);
  const lines = [];
  try {
    persistConn();
    $("cfgSession").value = testSession;
    LS.k = testSession;
    kernel.close();
    kernel.setConfig({ clock: "seeded", rngSeed: 777, modules: true, fetch: true, cellBudgetTicks: 200000 });

    const setup = await kernel.eval("globalThis.x=42; globalThis.inc=()=>++x; x");
    const setupOk = setup.ok !== false && setup.value === 42;
    lines.push(setupOk ? pass("eval writes durable state", "value=" + setup.value) : fail("eval writes durable state", JSON.stringify(setup)));

    await kernel.evict();
    const cold = await kernel.gen();
    const coldOk = cold.ok !== false && cold.inMemory === false;
    lines.push(coldOk ? pass("hibernate drops in-memory kernel", "inMemory=" + cold.inMemory) : fail("hibernate drops in-memory kernel", JSON.stringify(cold)));

    const restored = await kernel.eval("x");
    const restoredOk = restored.ok !== false && restored.value === 42 && /restore/.test(restored.restoreSource || "");
    lines.push(restoredOk ? pass("cold restore keeps heap state", "value=" + restored.value + " source=" + restored.restoreSource) : fail("cold restore keeps heap state", JSON.stringify(restored)));

    const closure = await kernel.eval("inc()");
    const closureOk = closure.ok !== false && closure.value === 43;
    lines.push(closureOk ? pass("closure survives restore", "value=" + closure.value) : fail("closure survives restore", JSON.stringify(closure)));

    const blocked = await kernel.eval("'x';" + " ".repeat(3 * 1024 * 1024));
    const blockedOk = blocked.ok === false && blocked.error && blocked.error.name === "ProtocolSizeError";
    lines.push(blockedOk ? pass("oversized source guard", blocked.error.name) : fail("oversized source guard", JSON.stringify(blocked).slice(0, 400)));

    const wedge = await kernel.send({ t: "wedgeTest", spikeMb: 22 }, 60000);
    const wedgeOk = !!(wedge && wedge.checkpoint && wedge.checkpoint.ok !== false && wedge.checkpoint.scrubbed === true);
    lines.push(wedgeOk ? pass("W5 spike/free checkpoint", "scrubbed=" + wedge.checkpoint.scrubbed + " gz=" + wedge.checkpoint.sizeGz) : fail("W5 spike/free checkpoint", JSON.stringify(wedge).slice(0, 400)));

    await kernel.evict();
    const wedgeRestore = await kernel.eval("x");
    const wedgeRestoreOk = wedgeRestore.ok !== false && wedgeRestore.value === 43 && /restore/.test(wedgeRestore.restoreSource || "");
    lines.push(wedgeRestoreOk ? pass("post-wedge cold restore", "value=" + wedgeRestore.value + " source=" + wedgeRestore.restoreSource) : fail("post-wedge cold restore", JSON.stringify(wedgeRestore)));

    const ok = lines.every((s) => !s.includes(">FAIL "));
    out.dataset.status = ok ? "pass" : "fail";
    out.innerHTML = lines.join("") + e2eLine(ok ? "final" : "err", ok ? "E2E PASS" : "E2E FAIL");
    return { ok, session: testSession, endpoint: $("cfgEndpoint").value, details: lines.map((l) => l.replace(/<[^>]+>/g, "")) };
  } catch (e) {
    out.dataset.status = "fail";
    out.innerHTML = lines.join("") + fail("E2E exception", String(e.message || e));
    return { ok: false, session: testSession, endpoint: $("cfgEndpoint").value, error: String(e.message || e) };
  } finally {
    $("cfgSession").value = oldSession || testSession;
    LS.k = $("cfgSession").value;
    refreshState();
  }
}

// ---- wiring ----------------------------------------------------------------
function ensureSession() {
  if (!$("cfgSession").value) $("cfgSession").value = LS.k || randId();
  LS.k = $("cfgSession").value;
}

$("addCell").onclick = () => addCell();
$("runAll").onclick = async () => { for (const el of $("cells").children) await el._run(); };
$("newSession").onclick = () => { $("cfgSession").value = randId(); LS.k = $("cfgSession").value; kernel.close(); refreshState(); };
$("reconnect").onclick = async () => { persistConn(); kernel.close(); kernel.setConfig(buildConfig()); await kernel.open(); refreshState(); };
$("hibernate").onclick = async () => { await kernel.evict(); refreshState(); };
$("resetSession").onclick = async () => { await kernel.reset(); refreshState(); };
$("runE2e").onclick = () => runDeployedE2e();
$("applyConfig").onclick = async () => {
  persistConn();
  $("cfgSession").value = randId(); LS.k = $("cfgSession").value;
  kernel.close(); kernel.setConfig(buildConfig()); await kernel.open();
  await kernel.eval("1"); refreshState();
};
// boot — URL params win, then persisted connection, then the deployed candidate default.
// Examples:
//   /?endpoint=wss://engram-kernel.umg-bhalla88.workers.dev&e2e=1
//   /?endpoint=wss://engram-kernel.umg-bhalla88.workers.dev
const epFromQuery = queryEndpoint();
if (epFromQuery) $("cfgEndpoint").value = epFromQuery;
else $("cfgEndpoint").value = LS.ep || DEFAULT_ENDPOINT;
if (qs.get("apiKey")) $("cfgApiKey").value = qs.get("apiKey");
else if (LS.key) $("cfgApiKey").value = LS.key;
if (qs.get("session")) $("cfgSession").value = qs.get("session");
const persistConn = () => { LS.ep = $("cfgEndpoint").value; LS.key = $("cfgApiKey").value.trim(); };
ensureSession();
kernel.setConfig(buildConfig());
addCell('// durable across reload: increment a counter that lives in the heap\nglobalThis.n = (globalThis.n||0) + 1;\nconsole.log("ran", n, "times");\nn');
addCell('// closures survive hibernation too\nglobalThis.inc = globalThis.inc || (()=>++globalThis.n);\ninc()');
kernel.open().then(refreshState).catch(refreshState);
window.__ENGRAM_E2E__ = runDeployedE2e;
if (qs.get("e2e") === "1") setTimeout(() => runDeployedE2e(), 250);
setInterval(refreshState, 15000);
</script>
</body>
</html>
