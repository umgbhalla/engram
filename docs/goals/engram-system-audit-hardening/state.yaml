      commands:
        - cmd: "bun run smoke:live"
          status: pass
        - cmd: "bun run e2e:ui"
          status: pass
        - cmd: "bun run check"
          status: pass
      summary: "Added the smoke:live script and package alias. It was initially blocked by a temporary public engram-kernel route failure, but the endpoint recovered during T019 verification; smoke:live, e2e:ui, and check now pass."
