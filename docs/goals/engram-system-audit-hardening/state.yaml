      verify:
        - "sed -n '1,220p' docs/TODO.md"
        - "bun run check"
      stop_if:
        - "Need files outside docs/TODO.md."
        - "The update would erase historical provenance instead of clearly superseding it."
        - "A claim cannot be backed by AGENTS.md, docs/reference/deployed.md, or completed GoalBuddy receipts."
